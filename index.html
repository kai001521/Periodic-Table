<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Periodic Table</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <!-- NEW: Back Button -->
    <button id="back-btn" class="back-btn">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
            <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
        </svg>
        Back to Table
    </button>

    <div id="landscape-warning">
        <svg viewBox="0 0 24 24">
            <path d="M16 1H8C6.34 1 5 2.34 5 4v16c0 1.66 1.34 3 3 3h8c1.66 0 3-1.34 3-3V4c0-1.66-1.34-3-3-3zm1 18H7V5h10v14z" />
        </svg>
        <h2>Please rotate your device</h2>
        <p>This periodic table is best viewed in landscape mode.</p>
    </div>

    <div class="wrapper">
        <header class="header">
            <h1>Periodic Table of Elements</h1>

            <!-- FILTERS -->
            <div class="filter-container">
                <div id="filters" class="filters"></div>
            </div>
        </header>

        <main>
            <div id="table" class="table"></div>
        </main>
    </div>

    <!-- NEW: Right Information Sidebar for Globe Mode -->
    <div id="info-right" class="info-right"></div>

    <script src="elements.js"></script>
    <script src="script.js"></script>
</body>

</html>
